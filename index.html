<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小灵感 - 原型预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #e5e5ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .device-container {
            width: 393px;
            height: 852px;
            background-color: #000;
            border-radius: 55px;
            padding: 14px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            flex-shrink: 0;
        }
        .screen {
            width: 100%;
            height: 100%;
            background-color: #f7f8fa;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }
        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background-color: #000;
            border-radius: 20px;
            z-index: 50;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 40px;
        }
        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="p-8 min-h-screen flex flex-col items-center">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">「小灵感」高保真原型预览</h1>
        <p class="text-gray-500">基于“小日常”风格的文字创作者提效 App (模拟 iPhone 15 Pro)</p>
    </div>

    <div class="flex flex-wrap justify-center gap-12 max-w-[1400px]">
        <!-- 今日页 -->
        <div class="flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">今日页 (Home)</h2>
            <div class="device-container">
                <div class="dynamic-island"></div>
                <div class="screen">
                    <iframe src="home.html"></iframe>
                </div>
            </div>
        </div>

        <!-- 素材页 -->
        <div class="flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">素材页 (Materials)</h2>
            <div class="device-container">
                <div class="dynamic-island"></div>
                <div class="screen">
                    <iframe src="materials.html"></iframe>
                </div>
            </div>
        </div>

        <!-- 专注页 -->
        <div class="flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">专注页 (Focus)</h2>
            <div class="device-container">
                <div class="dynamic-island"></div>
                <div class="screen">
                    <iframe src="focus.html"></iframe>
                </div>
            </div>
        </div>

        <!-- 统计页 -->
        <div class="flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">统计页 (Stats)</h2>
            <div class="device-container">
                <div class="dynamic-island"></div>
                <div class="screen">
                    <iframe src="stats.html"></iframe>
                </div>
            </div>
        </div>

        <!-- 我的页 -->
        <div class="flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">我的页 (Profile)</h2>
            <div class="device-container">
                <div class="dynamic-island"></div>
                <div class="screen">
                    <iframe src="profile.html"></iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
