<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f7f8fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03); }
        .tab-bar-shadow { box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col relative text-gray-800">
    <!-- iOS Status Bar -->
    <div class="h-12 w-full flex justify-between items-center px-6 pt-2 text-[15px] font-medium z-50">
        <span>09:41</span>
        <div class="flex space-x-2 items-center">
            <i class="fa-solid fa-signal text-xs"></i>
            <i class="fa-solid fa-wifi text-xs"></i>
            <i class="fa-solid fa-battery-full text-sm"></i>
        </div>
    </div>

    <!-- Main Content (Scrollable) -->
    <div class="flex-1 overflow-y-auto hide-scrollbar pb-28 px-5">
        
        <!-- Header -->
        <div class="flex justify-between items-center mt-4 mb-6">
            <div class="w-10"></div> <!-- Spacer -->
            <div class="text-center">
                <h1 class="text-xl font-bold flex items-center justify-center gap-1">
                    今日 · 周四 <i class="fa-solid fa-chevron-down text-xs text-gray-400 ml-1"></i>
                </h1>
                <p class="text-xs text-gray-400 mt-1">今天的创作输入与积累</p>
            </div>
            <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
        </div>

        <!-- Quick Nav Pills -->
        <div class="flex space-x-3 overflow-x-auto hide-scrollbar pb-2 mb-6">
            <button class="px-5 py-2 rounded-full bg-gray-800 text-white text-sm font-medium whitespace-nowrap">灵感</button>
            <button class="px-5 py-2 rounded-full bg-white text-gray-600 text-sm font-medium whitespace-nowrap card-shadow">素材</button>
            <button class="px-5 py-2 rounded-full bg-white text-gray-600 text-sm font-medium whitespace-nowrap card-shadow">专注中</button>
            <button class="px-5 py-2 rounded-full bg-white text-gray-600 text-sm font-medium whitespace-nowrap card-shadow">时间线</button>
            <button class="px-5 py-2 rounded-full bg-white text-gray-600 text-sm font-medium whitespace-nowrap card-shadow">拆解</button>
        </div>

        <!-- Overview Cards (2x2 Grid) -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-[#fcefc7] rounded-3xl p-4 relative overflow-hidden">
                <i class="fa-solid fa-clock text-[#d4a017] text-xl mb-2 opacity-80"></i>
                <h3 class="text-[#8a6d1c] text-xs font-medium">今日专注</h3>
                <p class="text-[#5c470a] text-lg font-bold mt-1">2h 10m</p>
            </div>
            <div class="bg-[#d0e8f2] rounded-3xl p-4 relative overflow-hidden">
                <i class="fa-solid fa-lightbulb text-[#4a8b9f] text-xl mb-2 opacity-80"></i>
                <h3 class="text-[#3b6d7d] text-xs font-medium">今日灵感</h3>
                <p class="text-[#254854] text-lg font-bold mt-1">3 条</p>
            </div>
            <div class="bg-[#d5e8d4] rounded-3xl p-4 relative overflow-hidden">
                <i class="fa-solid fa-book-open text-[#5b8a5a] text-xl mb-2 opacity-80"></i>
                <h3 class="text-[#436b42] text-xs font-medium">今日素材</h3>
                <p class="text-[#2b472a] text-lg font-bold mt-1">5 条</p>
            </div>
            <div class="bg-[#f8d7da] rounded-3xl p-4 relative overflow-hidden">
                <i class="fa-solid fa-language text-[#a94442] text-xl mb-2 opacity-80"></i>
                <h3 class="text-[#8a3533] text-xs font-medium">今日词汇</h3>
                <p class="text-[#5c2120] text-lg font-bold mt-1">12 条</p>
            </div>
        </div>

        <!-- Quick Input Section -->
        <div class="mb-8">
            <h2 class="text-base font-bold mb-4 text-gray-800">快速记录</h2>
            <div class="flex justify-between">
                <div class="flex flex-col items-center gap-2">
                    <button class="w-14 h-14 rounded-2xl bg-white card-shadow flex items-center justify-center text-blue-500 text-xl">
                        <i class="fa-solid fa-pen-nib"></i>
                    </button>
                    <span class="text-xs text-gray-500 font-medium">记灵感</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <button class="w-14 h-14 rounded-2xl bg-white card-shadow flex items-center justify-center text-green-500 text-xl">
                        <i class="fa-solid fa-bookmark"></i>
                    </button>
                    <span class="text-xs text-gray-500 font-medium">存素材</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <button class="w-14 h-14 rounded-2xl bg-white card-shadow flex items-center justify-center text-red-400 text-xl">
                        <i class="fa-solid fa-spell-check"></i>
                    </button>
                    <span class="text-xs text-gray-500 font-medium">存词汇</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <button class="w-14 h-14 rounded-2xl bg-white card-shadow flex items-center justify-center text-purple-500 text-xl">
                        <i class="fa-solid fa-layer-group"></i>
                    </button>
                    <span class="text-xs text-gray-500 font-medium">做拆解</span>
                </div>
            </div>
        </div>

        <!-- Inspiration List -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-bold text-gray-800">今日灵感 <span class="text-gray-400 text-sm font-normal ml-1">3</span></h2>
                <button class="text-gray-400"><i class="fa-solid fa-ellipsis"></i></button>
            </div>
            
            <div class="space-y-3">
                <!-- Card 1 -->
                <div class="bg-white rounded-3xl p-5 card-shadow relative">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2 text-xs text-yellow-500 font-medium bg-yellow-50 px-2 py-1 rounded-md">
                            <i class="fa-solid fa-sun"></i> 11:37
                        </div>
                        <button class="text-gray-300 hover:text-gray-500"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                    <p class="text-gray-700 text-sm leading-relaxed font-medium">
                        女主第一次见男主的场景：雨夜，巷口，一把黑色的伞遮住了半张脸，只露出冷冽的下颌线...
                    </p>
                </div>
                
                <!-- Card 2 -->
                <div class="bg-white rounded-3xl p-5 card-shadow relative">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2 text-xs text-blue-500 font-medium bg-blue-50 px-2 py-1 rounded-md">
                            <i class="fa-solid fa-moon"></i> 02:09
                        </div>
                        <button class="text-gray-300 hover:text-gray-500"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                    <p class="text-gray-700 text-sm leading-relaxed font-medium">
                        反派的动机不能太单薄，需要增加一段童年被抛弃的回忆，让他对“信任”产生病态的渴望。
                    </p>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="mb-8">
            <h2 class="text-base font-bold mb-4 text-gray-800">时间线</h2>
            <div class="bg-white rounded-3xl p-6 card-shadow">
                <div class="relative border-l-2 border-gray-100 ml-3 space-y-6">
                    <div class="relative pl-6">
                        <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-green-100 border-2 border-white flex items-center justify-center">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        </div>
                        <p class="text-xs text-gray-400 mb-1">16:40</p>
                        <p class="text-sm font-medium text-gray-700">新增拆解「冲突升级节奏」</p>
                    </div>
                    <div class="relative pl-6">
                        <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-yellow-100 border-2 border-white flex items-center justify-center">
                            <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        </div>
                        <p class="text-xs text-gray-400 mb-1">14:20</p>
                        <p class="text-sm font-medium text-gray-700">专注 25 分钟（阅读）</p>
                    </div>
                    <div class="relative pl-6">
                        <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-blue-100 border-2 border-white flex items-center justify-center">
                            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        </div>
                        <p class="text-xs text-gray-400 mb-1">10:12</p>
                        <p class="text-sm font-medium text-gray-700">新增素材「人物心理描写」</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Bottom Tab Bar -->
    <div class="absolute bottom-0 w-full px-6 pb-8 pt-4 bg-white/90 backdrop-blur-md tab-bar-shadow rounded-t-[40px] flex justify-between items-center z-40">
        <a href="home.html" class="flex flex-col items-center gap-1 text-gray-800">
            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg">
                <i class="fa-solid fa-calendar-day"></i>
            </div>
            <span class="text-[10px] font-bold">今日</span>
        </a>
        <a href="materials.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-box-archive"></i>
            </div>
            <span class="text-[10px] font-medium">素材</span>
        </a>
        <a href="focus.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition relative -top-2">
            <div class="w-14 h-14 rounded-full bg-[#ff6b6b] text-white flex items-center justify-center text-2xl shadow-lg shadow-red-200">
                <i class="fa-solid fa-stopwatch"></i>
            </div>
        </a>
        <a href="stats.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-chart-simple"></i>
            </div>
            <span class="text-[10px] font-medium">统计</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-user"></i>
            </div>


            
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </div>

</body>
</html>
