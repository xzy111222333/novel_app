<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f7f8fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03); }
        .tab-bar-shadow { box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col relative text-gray-800">
    <!-- iOS Status Bar -->
    <div class="h-12 w-full flex justify-between items-center px-6 pt-2 text-[15px] font-medium z-50">
        <span>09:41</span>
        <div class="flex space-x-2 items-center">
            <i class="fa-solid fa-signal text-xs"></i>
            <i class="fa-solid fa-wifi text-xs"></i>
            <i class="fa-solid fa-battery-full text-sm"></i>
        </div>
    </div>

    <!-- Header -->
    <div class="flex justify-between items-center px-5 mt-4 mb-6">
        <button class="w-10 h-10 rounded-full bg-white card-shadow flex items-center justify-center text-gray-600 hover:bg-gray-50 transition">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-800">番茄专注</h1>
        <button class="w-10 h-10 rounded-full bg-white card-shadow flex items-center justify-center text-gray-600 hover:bg-gray-50 transition">
            <i class="fa-solid fa-list-ul"></i>
        </button>
    </div>

    <!-- Time Selection -->
    <div class="flex space-x-3 overflow-x-auto hide-scrollbar px-5 pb-2 mb-6">
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-gray-800 text-white font-bold text-xl flex items-center justify-center border-4 border-gray-300">正</button>
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-[#fcefc7] text-[#d4a017] font-bold text-xl flex items-center justify-center">25</button>
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-[#d0e8f2] text-[#4a8b9f] font-bold text-xl flex items-center justify-center">45</button>
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-[#f8d7da] text-[#a94442] font-bold text-xl flex items-center justify-center">60</button>
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-[#d5e8d4] text-[#5b8a5a] font-bold text-xl flex items-center justify-center">90</button>
        <button class="w-[60px] h-[60px] flex-shrink-0 rounded-2xl bg-white border border-dashed border-gray-300 text-gray-400 font-medium text-xs flex flex-col items-center justify-center">
            <i class="fa-solid fa-sliders mb-1"></i>自定义
        </button>
    </div>

    <!-- Main Timer Area -->
    <div class="flex-1 flex flex-col items-center justify-center px-5 pb-28">
        <div class="bg-white w-full max-w-[320px] rounded-[40px] p-8 card-shadow flex flex-col items-center">
            
            <!-- Focus Type -->
            <div class="flex flex-col items-center mb-8">
                <span class="text-xs text-gray-400 mb-2">专注项目</span>
                <button class="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full border border-gray-100 hover:bg-gray-100 transition">
                    <div class="w-6 h-6 rounded-full bg-[#fcefc7] flex items-center justify-center text-[#d4a017] text-xs">
                        <i class="fa-solid fa-book-open-reader"></i>
                    </div>
                    <span class="text-sm font-bold text-gray-700">阅读输入</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 ml-1"></i>
                </button>
            </div>

            <!-- Timer Display -->
            <div class="text-[72px] font-black tracking-tighter text-gray-800 leading-none mb-10 font-mono">
                00:00
            </div>

            <!-- Action Button -->
            <button class="w-48 h-14 rounded-full bg-gray-800 text-white font-bold text-lg hover:bg-gray-700 transition shadow-lg shadow-gray-300 flex items-center justify-center gap-2">
                开始正计时
            </button>
        </div>

        <!-- Sub Actions -->
        <div class="flex justify-between w-full max-w-[300px] mt-12 px-4">
            <button class="flex flex-col items-center gap-2 text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-music text-xl"></i>
                <span class="text-[10px] font-medium">音乐</span>
            </button>
            <button class="flex flex-col items-center gap-2 text-blue-400 hover:text-blue-500 transition">
                <i class="fa-solid fa-lightbulb text-xl"></i>
                <span class="text-[10px] font-medium">常亮</span>
            </button>
            <button class="flex flex-col items-center gap-2 text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-mobile-screen text-xl"></i>
                <span class="text-[10px] font-medium">白名单</span>
            </button>
            <button class="flex flex-col items-center gap-2 text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-repeat text-xl"></i>
                <span class="text-[10px] font-medium">循环</span>
            </button>
            <button class="flex flex-col items-center gap-2 text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-plus-square text-xl"></i>
                <span class="text-[10px] font-medium">记录</span>
            </button>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="absolute bottom-0 w-full px-6 pb-8 pt-4 bg-white/90 backdrop-blur-md tab-bar-shadow rounded-t-[40px] flex justify-between items-center z-40">
        <a href="home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-calendar-day"></i>
            </div>
            <span class="text-[10px] font-medium">今日</span>
        </a>
        <a href="materials.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-box-archive"></i>
            </div>
            <span class="text-[10px] font-medium">素材</span>
        </a>
        <a href="focus.html" class="flex flex-col items-center gap-1 text-gray-800 relative -top-2">
            <div class="w-14 h-14 rounded-full bg-[#ff6b6b] text-white flex items-center justify-center text-2xl shadow-lg shadow-red-200 border-4 border-white">
                <i class="fa-solid fa-stopwatch"></i>
            </div>
        </a>
        <a href="stats.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-chart-simple"></i>
            </div>
            <span class="text-[10px] font-medium">统计</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-800 transition">
            <div class="w-10 h-10 flex items-center justify-center text-xl">
                <i class="fa-solid fa-user"></i>
            </div>
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </div>

</body>
</html>
